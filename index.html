<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeNow Poster Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f7;
      color: #1a1a1a;
      min-height: 100vh;
    }

    .app-header {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .app-header svg { width: 28px; height: 28px; }
    .app-header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.36px; }

    .app-layout {
      display: flex;
      height: calc(100vh - 61px);
    }

    /* ---- Input Panel ---- */
    .input-panel {
      width: 380px;
      min-width: 380px;
      background: #fff;
      border-right: 1px solid #e5e5e5;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #999999;
      margin-bottom: 8px;
    }

    .input-group { display: flex; flex-direction: column; gap: 6px; }
    .input-group label { font-size: 14px; font-weight: 600; letter-spacing: -0.28px; }

    .text-input {
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.3px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .text-input:focus { border-color: #0869D8; }

    .upload-zone {
      border: 2px dashed #ddd;
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .upload-zone:hover { border-color: #0869D8; background: #f0f5ff; }
    .upload-zone.has-file { border-style: solid; border-color: #0869D8; padding: 8px; }
    .upload-zone input { display: none; }

    .upload-zone .upload-icon {
      width: 40px; height: 40px; margin: 0 auto 8px;
      background: #f0f0f0; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: #999;
    }
    .upload-zone .upload-text { font-size: 13px; color: #888; }
    .upload-zone .upload-text strong { color: #0869D8; }

    .upload-zone img {
      max-width: 100%;
      max-height: 80px;
      object-fit: contain;
      border-radius: 6px;
    }

    .upload-zone .remove-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 22px;
      height: 22px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Format Selection */
    .format-presets {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .format-btn {
      padding: 8px 4px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.26px;
      transition: all 0.15s;
      text-align: center;
    }
    .format-btn:hover { border-color: #0869D8; }
    .format-btn.active { border-color: #0869D8; background: #0869D8; color: #fff; }
    .format-btn .format-size { font-size: 10px; font-weight: 400; opacity: 0.7; display: block; margin-top: 2px; }

    .orientation-toggle {
      display: flex;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      overflow: visible;
    }
    .orientation-btn {
      flex: 1 1 50%;
      min-width: 0;
      padding: 10px 6px;
      border: none;
      background: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.26px;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .orientation-btn:first-child { border-radius: 9px 0 0 9px; }
    .orientation-btn:last-child { border-radius: 0 9px 9px 0; }
    .orientation-btn.active { background: #0869D8; color: #fff; }
    .orientation-btn .orient-icon {
      width: 14px; height: 18px; border: 2px solid currentColor; border-radius: 2px; flex-shrink: 0;
    }
    .orientation-btn[data-orient="landscape"] .orient-icon {
      width: 18px; height: 14px;
    }

    .custom-size {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .custom-size input {
      width: 80px;
      padding: 8px 10px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      text-align: center;
      outline: none;
    }
    .custom-size input:focus { border-color: #0869D8; }
    .custom-size .x { font-size: 14px; color: #999; font-weight: 600; }
    .custom-size .unit { font-size: 13px; color: #888; }

    .download-buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: auto;
      padding-top: 20px;
    }

    .download-btn {
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.3px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .download-btn.pdf {
      background: #0869D8;
      color: #fff;
    }
    .download-btn.pdf:hover { background: #0135E4; }
    .download-btn.jpg {
      background: #f0f0f0;
      color: #1a1a1a;
    }
    .download-btn.jpg:hover { background: #e5e5e5; }
    .download-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ---- Preview Area ---- */
    .preview-area {
      flex: 1;
      overflow: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      background: #e8e8ec;
    }

    .preview-wrapper {
      box-shadow: 0 8px 40px rgba(0,0,0,0.15);
      transform-origin: center center;
    }

    /* ---- Poster Styles ---- */
    .poster {
      background: #ffffff;
      position: relative;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    .poster * {
      font-family: 'Inter', sans-serif;
    }

    /* Portrait Layout */
    .poster.portrait {
      display: flex;
      flex-direction: column;
    }

    .poster.portrait .poster-top {
      padding: 4% 6% 0;
      text-align: center;
    }

    .poster .safenow-logo-top {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6em;
      margin-bottom: 3%;
    }

    .poster .safenow-logo-top svg {
      width: 3%;
      min-width: 20px;
      height: auto;
    }

    .poster .safenow-logo-top span {
      font-size: 1.8%;
      font-weight: 700;
      color: #1a1a1a;
    }

    .poster .headline {
      font-weight: 900;
      color: #1a1a1a;
      line-height: 1.05;
      margin-bottom: 2%;
    }

    .poster.portrait .headline {
      font-size: 5.5%;
    }

    .poster .subtext {
      color: #555;
      line-height: 1.5;
      max-width: 70%;
      margin: 0 auto;
    }

    .poster.portrait .subtext {
      font-size: 1.8%;
    }

    .poster.portrait .poster-middle {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2% 4%;
    }

    .poster .phone-mockup {
      position: relative;
      width: 55%;
      max-width: 400px;
    }

    .poster .phone-mockup img {
      width: 100%;
      height: auto;
    }

    .poster .phone-overlay {
      position: absolute;
      top: 14%;
      left: 12%;
      width: 76%;
      height: 72%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8% 6% 0;
      overflow: hidden;
      background: #f0f0f0;
      border-radius: 4%;
    }

    .poster .phone-zone-bar {
      display: flex;
      align-items: center;
      gap: 6%;
      background: #fff;
      border-radius: 12px;
      padding: 4% 8%;
      width: 90%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 8%;
    }

    .poster .phone-zone-bar .zone-logo {
      width: 20%;
      height: auto;
      max-height: 30px;
      object-fit: contain;
    }

    .poster .phone-zone-bar .zone-info {
      display: flex;
      flex-direction: column;
    }

    .poster .phone-zone-bar .zone-name-display {
      font-weight: 700;
      font-size: 70%;
      color: #1a1a1a;
    }

    .poster .phone-zone-bar .zone-label {
      font-size: 50%;
      color: #0869D8;
    }

    .poster.portrait .poster-bottom {
      padding: 0 6% 4%;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .poster .bottom-left {
      display: flex;
      flex-direction: column;
      gap: 0.5em;
    }

    .poster .initiative-text {
      font-size: 1.2%;
      color: #888;
      min-font-size: 8px;
    }

    .poster .initiative-logos {
      display: flex;
      align-items: center;
      gap: 1em;
    }

    .poster .initiative-logos img {
      height: 2.5%;
      min-height: 18px;
      max-height: 35px;
      object-fit: contain;
    }

    .poster .initiative-logos .safenow-small {
      display: flex;
      align-items: center;
      gap: 0.3em;
    }

    .poster .initiative-logos .safenow-small svg {
      width: 14px; height: 14px;
    }
    .poster .initiative-logos .safenow-small span {
      font-size: 12px; font-weight: 700;
    }

    .poster .bottom-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.6em;
    }

    .poster .handwriting {
      font-style: italic;
      font-size: 1.4%;
      color: #1a1a1a;
      text-align: right;
      transform: rotate(-5deg);
      margin-bottom: 0.3em;
    }

    .poster .qr-code-display {
      width: 12%;
      min-width: 60px;
      max-width: 120px;
      height: auto;
    }

    .poster .store-badges {
      display: flex;
      flex-direction: column;
      gap: 0.3em;
      align-items: flex-end;
    }

    .poster .store-badges img {
      height: 2.5%;
      min-height: 20px;
      max-height: 32px;
    }

    .poster .website-text {
      font-size: 1.1%;
      color: #888;
      text-align: right;
    }

    /* Landscape Layout */
    .poster.landscape {
      display: grid;
      grid-template-columns: 55% 45%;
      grid-template-rows: 1fr auto;
    }

    .poster.landscape .poster-top {
      grid-column: 1;
      grid-row: 1;
      padding: 6% 6% 2%;
      text-align: left;
      display: flex;
      flex-direction: column;
    }

    .poster.landscape .safenow-logo-top {
      justify-content: flex-start;
    }

    .poster.landscape .headline {
      font-size: 5%;
    }

    .poster.landscape .subtext {
      font-size: 1.6%;
      margin: 0;
      max-width: 90%;
    }

    .poster.landscape .poster-middle {
      grid-column: 1;
      grid-row: 2;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 0 6% 4%;
    }

    .poster.landscape .phone-mockup {
      width: 60%;
    }

    .poster.landscape .poster-right {
      grid-column: 2;
      grid-row: 1 / 3;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 6% 6% 4%;
      align-items: flex-end;
    }

    .poster.landscape .poster-bottom {
      display: contents;
    }

    /* Placeholder styles */
    .placeholder {
      color: #ccc;
      font-style: italic;
    }

    .logo-placeholder, .qr-placeholder {
      width: 100%;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      border-radius: 8px;
      color: #ccc;
      font-size: 12px;
    }

    /* Loading overlay */
    .export-loading {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .export-loading .spinner {
      background: #fff;
      padding: 32px 48px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .export-loading .spinner::before {
      content: '';
      width: 24px;
      height: 24px;
      border: 3px solid #eee;
      border-top-color: #0869D8;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Sliders */
    .slider {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #e5e5e5;
      outline: none;
    }
    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #0869D8;
      cursor: pointer;
      border: 2px solid #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    /* Hidden render target */
    .render-target {
      position: fixed;
      left: -99999px;
      top: 0;
    }
  </style>
</head>
<body>

  <div class="app-header">
    <svg viewBox="0 0 383 383" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:28px;height:28px;">
      <rect width="382.163" height="382.163" rx="191.082" fill="url(#snGradH)"/>
      <path fill-rule="evenodd" clip-rule="evenodd" d="M145.513 251.251L176.38 222.136C161.915 217.427 151.044 205.407 147.828 190.567C144.612 175.726 149.534 160.298 160.756 150.045L212.47 101.267C176.806 91.7129 139.13 107.025 120.302 138.725C101.475 170.425 106.102 210.757 131.622 237.39L145.513 251.251ZM263.07 140.487C266.999 147.55 269.849 155.159 271.527 163.062L271.484 163.125C277.308 189.824 269.437 217.664 250.49 237.39L191.06 296.675L161.419 267.011L218.502 213.148L219.327 212.389C229.959 202.216 234.603 187.302 231.623 172.907C228.642 158.512 218.456 146.657 204.654 141.521L236.114 111.858C247.28 119.094 256.528 128.916 263.07 140.487Z" fill="white"/>
      <defs><linearGradient id="snGradH" x1="51.59" y1="57.32" x2="321.02" y2="343.95" gradientUnits="userSpaceOnUse"><stop stop-color="#0995FF"/><stop offset="1" stop-color="#0034E3"/></linearGradient></defs>
    </svg>
    <h1>SafeNow Poster Generator</h1>
  </div>

  <div class="app-layout">
    <!-- Input Panel -->
    <div class="input-panel">
      <div class="section-title">Inhalte</div>

      <div class="input-group">
        <label>Kundenlogo</label>
        <div class="upload-zone" id="logoUpload" onclick="document.getElementById('logoInput').click()">
          <input type="file" id="logoInput" accept="image/*">
          <div class="upload-icon">+</div>
          <div class="upload-text"><strong>Logo hochladen</strong><br>PNG, JPG oder SVG</div>
        </div>
      </div>

      <div class="input-group">
        <label>Zonenname</label>
        <input type="text" class="text-input" id="zoneName" placeholder="z.B. Uniklinik Freiburg">
      </div>

      <div class="input-group">
        <label>Headline (2. Zeile)</label>
        <input type="text" class="text-input" id="headlineText" placeholder="z.B. an der Uniklinik Freiburg">
      </div>

      <div class="input-group">
        <label>Headline Breite <span id="headlineWidthVal" style="font-weight:500;color:#999999;">60%</span></label>
        <input type="range" class="slider" id="headlineWidth" min="20" max="100" value="60" step="1">
      </div>

      <div class="input-group">
        <label>QR-Code Link</label>
        <input type="text" class="text-input" id="qrLink" placeholder="https://safenow.app/...">
        <button class="format-btn" style="padding:10px;margin-top:4px;background:#0869D8;color:#fff;border-color:#0869D8;" onclick="generateQR()">QR-Code generieren</button>
      </div>

      <div class="section-title" style="margin-top: 8px;">Format</div>

      <div class="format-presets" id="formatPresets">
        <button class="format-btn" data-w="594" data-h="841" data-name="A1">A1<span class="format-size">594x841</span></button>
        <button class="format-btn" data-w="420" data-h="594" data-name="A2">A2<span class="format-size">420x594</span></button>
        <button class="format-btn active" data-w="297" data-h="420" data-name="A3">A3<span class="format-size">297x420</span></button>
        <button class="format-btn" data-w="210" data-h="297" data-name="A4">A4<span class="format-size">210x297</span></button>
        <button class="format-btn" data-w="148" data-h="210" data-name="A5">A5<span class="format-size">148x210</span></button>
        <button class="format-btn" data-w="105" data-h="148" data-name="A6">A6<span class="format-size">105x148</span></button>
      </div>

      <div class="orientation-toggle">
        <button class="orientation-btn active" data-orient="portrait" onclick="setOrientation('portrait')">
          <div class="orient-icon"></div>
          Hochformat
        </button>
        <button class="orientation-btn" data-orient="landscape" onclick="setOrientation('landscape')">
          <div class="orient-icon"></div>
          Querformat
        </button>
      </div>

      <div class="input-group">
        <label>Custom (px)</label>
        <div class="custom-size">
          <input type="number" id="customW" placeholder="Breite" min="100">
          <span class="x">&times;</span>
          <input type="number" id="customH" placeholder="Hoehe" min="100">
          <span class="unit">px</span>
          <button class="format-btn" style="padding: 8px 12px; white-space: nowrap;" onclick="applyCustomSize()">OK</button>
        </div>
      </div>

      <div class="section-title" style="margin-top: 8px;">Phone-Bild</div>

      <div class="input-group">
        <label>Drehung <span id="phoneRotVal" style="font-weight:500;color:#999999;">20°</span></label>
        <input type="range" class="slider" id="phoneRotation" min="-45" max="45" value="20" step="1">
      </div>
      <div class="input-group">
        <label>Groesse <span id="phoneScaleVal" style="font-weight:500;color:#999999;">154%</span></label>
        <input type="range" class="slider" id="phoneScale" min="50" max="250" value="154" step="1">
      </div>
      <div class="input-group">
        <label>Position X <span id="phonePosXVal" style="font-weight:500;color:#999999;">4%</span></label>
        <input type="range" class="slider" id="phonePosX" min="-150" max="150" value="4" step="1">
      </div>
      <div class="input-group">
        <label>Position Y <span id="phonePosYVal" style="font-weight:500;color:#999999;">24%</span></label>
        <input type="range" class="slider" id="phonePosY" min="-150" max="150" value="24" step="1">
      </div>

      <div class="download-buttons">
        <button class="download-btn pdf" onclick="exportPDF()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
          PDF herunterladen
        </button>
        <button class="download-btn jpg" onclick="exportJPG()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
          JPG herunterladen
        </button>
      </div>
    </div>

    <!-- Preview Area -->
    <div class="preview-area" id="previewArea">
      <div class="preview-wrapper" id="previewWrapper">
        <!-- Poster gets rendered here -->
      </div>
    </div>
  </div>

  <!-- Hidden full-size render target for export -->
  <div class="render-target" id="renderTarget"></div>

<script>
  // ---- State ----
  const DPI = 3.78; // 1mm = 3.78px at 96dpi
  const EXPORT_SCALE = 3;

  let state = {
    logoDataUrl: null,
    zoneName: '',
    qrDataUrl: null,
    headlineText: '',
    headlineWidth: 60,
    widthMM: 297,
    heightMM: 420,
    orientation: 'portrait',
    formatName: 'A3',
    isCustom: false,
    phoneRotation: 20,
    phoneScale: 154,
    phonePosX: 4,
    phonePosY: 24,
    barPosX: 36,
    barPosY: -1,
    barLandPosX: 36,
    barLandPosY: -1,
    barLandZoom: 62,
  };

  const phoneDefaults = {
    portrait:  { phoneRotation: 20, phoneScale: 154, phonePosX: 4, phonePosY: 24 },
    landscape: { phoneRotation: 24, phoneScale: 149, phonePosX: -19, phonePosY: 19 },
  };

  // ---- SafeNow SVG Logo (inline) ----

    const wPx = Math.round(state.widthMM * DPI * (scale || 1));

    const actualW = isLandscape ? Math.max(wPx, hPx) : Math.min(wPx, hPx);

    const ref = Math.sqrt(actualW * actualH); // proportional reference based on poster area

    const zoneName = state.zoneName || 'Dein Standort';
    const headlineLine2 = state.headlineText || '';

      ? `<img src="${state.logoDataUrl}" style="max-height:${ref * 0.035}px; max-width:${ref * 0.12}px; object-fit:contain;">`

  // ---- Update Preview ----
  function updatePreview() {
    const wrapper = document.getElementById('previewWrapper');
    const area = document.getElementById('previewArea');

    renderPoster(wrapper, 1);

    // Scale to fit preview area
    const areaW = area.clientWidth - 64;
    const areaH = area.clientHeight - 64;
    const isLandscape = state.orientation === 'landscape';
    const posterW = state.widthMM * DPI;
    const posterH = state.heightMM * DPI;
    const actualW = isLandscape ? Math.max(posterW, posterH) : Math.min(posterW, posterH);
    const actualH = isLandscape ? Math.min(posterW, posterH) : Math.max(posterW, posterH);

    const scaleX = areaW / actualW;
    const scaleY = areaH / actualH;
    const scale = Math.min(scaleX, scaleY, 1);

    wrapper.style.transform = `scale(${scale})`;
    wrapper.style.width = `${actualW}px`;
    wrapper.style.height = `${actualH}px`;
  }

  // ---- File Upload Handlers ----
  function setupUpload(zoneId, inputId, stateKey) {
    const zone = document.getElementById(zoneId);
    const input = document.getElementById(inputId);

    input.addEventListener('change', (e) => {
      if (e.target.files[0]) handleFile(e.target.files[0], zoneId, stateKey);
    });

    zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.style.borderColor = '#0869D8'; });
    zone.addEventListener('dragleave', () => { zone.style.borderColor = ''; });
    zone.addEventListener('drop', (e) => {
      e.preventDefault();
      zone.style.borderColor = '';
      if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0], zoneId, stateKey);
    });
  }

  function handleFile(file, zoneId, stateKey) {
    const reader = new FileReader();
    reader.onload = (e) => {
      state[stateKey] = e.target.result;
      const zone = document.getElementById(zoneId);
      zone.classList.add('has-file');
      zone.innerHTML = `
        <img src="${e.target.result}">
        <button class="remove-btn" onclick="event.stopPropagation();removeFile('${zoneId}','${stateKey}','${zoneId === 'logoUpload' ? 'logoInput' : 'qrInput'}')">&times;</button>
      `;
      updatePreview();
    };
    reader.readAsDataURL(file);
  }

  function removeFile(zoneId, stateKey, inputId) {
    state[stateKey] = null;
    document.getElementById(inputId).value = '';
    const zone = document.getElementById(zoneId);
    zone.classList.remove('has-file');
    const isLogo = stateKey === 'logoDataUrl';
    zone.innerHTML = `
      <input type="file" id="${inputId}" accept="image/*">
      <div class="upload-icon">+</div>
      <div class="upload-text"><strong>${isLogo ? 'Logo hochladen' : 'QR-Code hochladen'}</strong><br>${isLogo ? 'PNG, JPG oder SVG' : 'PNG oder JPG'}</div>
    `;
    setupUpload(zoneId, inputId, stateKey);
    updatePreview();
  }

  // ---- Format Selection ----
  document.querySelectorAll('.format-btn[data-w]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.format-btn[data-w]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.widthMM = parseInt(btn.dataset.w);
      state.heightMM = parseInt(btn.dataset.h);
      state.formatName = btn.dataset.name;
      state.isCustom = false;
      document.getElementById('customW').value = '';
      document.getElementById('customH').value = '';
      updatePreview();
    });
  });

  function setOrientation(orient) {
    state.orientation = orient;
    document.querySelectorAll('.orientation-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.orient === orient);
    });
    // Apply phone defaults for this orientation
    const def = phoneDefaults[orient];
    Object.assign(state, def);
    document.getElementById('phoneRotation').value = def.phoneRotation;
    document.getElementById('phoneRotVal').textContent = def.phoneRotation + '\u00B0';
    document.getElementById('phoneScale').value = def.phoneScale;
    document.getElementById('phoneScaleVal').textContent = def.phoneScale + '%';
    document.getElementById('phonePosX').value = def.phonePosX;
    document.getElementById('phonePosXVal').textContent = def.phonePosX + '%';
    document.getElementById('phonePosY').value = def.phonePosY;
    document.getElementById('phonePosYVal').textContent = def.phonePosY + '%';
    updatePreview();
  }

  function applyCustomSize() {
    const w = parseInt(document.getElementById('customW').value);
    const h = parseInt(document.getElementById('customH').value);
    if (w >= 100 && h >= 100) {
      // Convert px to mm (assuming 96dpi)
      state.widthMM = Math.round(w / DPI);
      state.heightMM = Math.round(h / DPI);
      state.formatName = `${w}x${h}px`;
      state.isCustom = true;
      state.orientation = w > h ? 'landscape' : 'portrait';
      document.querySelectorAll('.format-btn[data-w]').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.orientation-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.orient === state.orientation);
      });
      updatePreview();
    }
  }

  // ---- Zone Name ----
  document.getElementById('zoneName').addEventListener('input', (e) => {
    state.zoneName = e.target.value;
    updatePreview();
  });
  document.getElementById('headlineText').addEventListener('input', (e) => {
    state.headlineText = e.target.value;
    updatePreview();
  });

  // ---- Export Functions ----
  function showLoading(text) {
    const el = document.createElement('div');
    el.className = 'export-loading';
    el.innerHTML = `<div class="spinner">${text}</div>`;
    document.body.appendChild(el);
    return el;
  }

  async function exportJPG() {
    const loading = showLoading('JPG wird erstellt...');
    const target = document.getElementById('renderTarget');

    try {
      renderPoster(target, EXPORT_SCALE);
      const posterEl = target.firstElementChild;

      const canvas = await html2canvas(posterEl, {
        scale: 1,
        useCORS: true,
        allowTaint: true,
        backgroundColor: '#ffffff',
        width: parseInt(posterEl.style.width),
        height: parseInt(posterEl.style.height),
      });

      const link = document.createElement('a');
      const name = state.zoneName || 'Poster';
      link.download = `SafeNow_Plakat_${name.replace(/\s+/g, '_')}_${state.formatName}.jpg`;
      link.href = canvas.toDataURL('image/jpeg', 0.95);
      link.click();
    } catch (err) {
      console.error('Export error:', err);
      alert('Export fehlgeschlagen. Bitte versuche es erneut.');
    } finally {
      target.innerHTML = '';
      loading.remove();
    }
  }

  async function exportPDF() {
    const loading = showLoading('PDF wird erstellt...');
    const target = document.getElementById('renderTarget');

    try {
      renderPoster(target, EXPORT_SCALE);
      const posterEl = target.firstElementChild;

      const canvas = await html2canvas(posterEl, {
        scale: 1,
        useCORS: true,
        allowTaint: true,
        backgroundColor: '#ffffff',
        width: parseInt(posterEl.style.width),
        height: parseInt(posterEl.style.height),
      });

      const { jsPDF } = window.jspdf;
      const isLandscape = state.orientation === 'landscape';
      const pdfW = isLandscape ? Math.max(state.widthMM, state.heightMM) : Math.min(state.widthMM, state.heightMM);
      const pdfH = isLandscape ? Math.min(state.widthMM, state.heightMM) : Math.max(state.widthMM, state.heightMM);

      const pdf = new jsPDF({
        orientation: isLandscape ? 'landscape' : 'portrait',
        unit: 'mm',
        format: [pdfW, pdfH],
      });

      const imgData = canvas.toDataURL('image/jpeg', 0.95);
      pdf.addImage(imgData, 'JPEG', 0, 0, pdfW, pdfH);

      const name = state.zoneName || 'Poster';
      pdf.save(`SafeNow_Plakat_${name.replace(/\s+/g, '_')}_${state.formatName}.pdf`);
    } catch (err) {
      console.error('Export error:', err);
      alert('Export fehlgeschlagen. Bitte versuche es erneut.');
    } finally {
      target.innerHTML = '';
      loading.remove();
    }
  }

  // ---- Phone Sliders ----
  function setupSlider(id, stateKey, valId, suffix) {
    const slider = document.getElementById(id);
    const valEl = document.getElementById(valId);
    slider.addEventListener('input', () => {
      state[stateKey] = parseInt(slider.value);
      valEl.textContent = slider.value + suffix;
      updatePreview();
    });
  }
  setupSlider('phoneRotation', 'phoneRotation', 'phoneRotVal', '\u00B0');
  setupSlider('phoneScale', 'phoneScale', 'phoneScaleVal', '%');
  setupSlider('phonePosX', 'phonePosX', 'phonePosXVal', '%');
  setupSlider('phonePosY', 'phonePosY', 'phonePosYVal', '%');
  setupSlider('headlineWidth', 'headlineWidth', 'headlineWidthVal', '%');
  // ---- Init ----
  setupUpload('logoUpload', 'logoInput', 'logoDataUrl');
  // QR Code generation from link (using qrcodejs)
  function generateQR() {
    const url = document.getElementById('qrLink').value.trim();
    if (!url) { state.qrDataUrl = null; updatePreview(); return; }
    try {
      // Create a temporary hidden div for QRCode to render into
      const tmpDiv = document.createElement('div');
      tmpDiv.style.cssText = 'position:fixed;left:-9999px;top:0;';
      document.body.appendChild(tmpDiv);
      const qr = new QRCode(tmpDiv, {
        text: url,
        width: 512,
        height: 512,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H,
      });
      // QRCode renders async via canvas, grab it after a tick
      setTimeout(() => {
        const canvas = tmpDiv.querySelector('canvas');
        if (canvas) {
          state.qrDataUrl = canvas.toDataURL('image/png');
          updatePreview();
        }
        document.body.removeChild(tmpDiv);
      }, 100);
    } catch (err) {
      console.error('QR generation failed:', err);
      alert('QR-Code konnte nicht generiert werden. Bitte pruefe den Link.');
    }
  }
  // Also generate on Enter key
  document.getElementById('qrLink').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') generateQR();
  });

  // Default QR code
  document.getElementById('qrLink').value = 'https://go.safenow.app/general';
  generateQR();

  updatePreview();

  // Resize handler
  window.addEventListener('resize', updatePreview);

  // Custom size enter key
  document.getElementById('customH').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') applyCustomSize();
  });
</script>

</body>
